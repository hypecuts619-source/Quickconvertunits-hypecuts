<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <g stroke="url(#qGrad)">
    <!-- Top arc forming left and top, going towards right -->
    <path d="M 4.5 12 A 7.5 7.5 0 0 1 18.5 8" />
    <path d="M 18.5 8 L 18.5 3.5 M 18.5 8 L 14 8" />

    <!-- Bottom arc forming right and bottom, going towards left -->
    <path d="M 19.5 12 A 7.5 7.5 0 0 1 5.5 16" />
    <path d="M 5.5 16 L 5.5 20.5 M 5.5 16 L 10 16" />

    <!-- Q tail -->
    <path d="M 14.5 14.5 L 21 21" />
  </g>
</svg>
